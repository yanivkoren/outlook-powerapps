<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Power Apps Debug</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      direction: rtl;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    #status {
      margin-top: 10px;
      font-size: 13px;
      color: #444;
    }

    #debug {
      margin-top: 15px;
      padding: 10px;
      background: #f4f4f4;
      border: 1px solid #ddd;
      font-size: 12px;
      white-space: pre-wrap;
      direction: ltr;
    }
  </style>
</head>

<body>
  <button id="btn" disabled>פתח (DEBUG) 1</button>
  <div id="status">טוען...</div>
  <div id="debug"></div>

  <script>
    const APP_URL = "https://apps.powerapps.com/play/e/default-89e846c1-57c1-4a4c-b65a-6d2107dbdb64/a/71905a42-b9c2-42d1-b242-d63f52f2b0cf?tenantId=89e846c1-57c1-4a4c-b65a-6d2107dbdb64";
    // const APP_URL = "https://example.com"; 
    // const APP_URL = "https://apps.powerapps.com/play?appId=APP_ID_HERE";

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function setDebug(obj) {
      document.getElementById("debug").textContent = JSON.stringify(obj, null, 2);
    }

    Office.onReady(function () {
      const btn = document.getElementById("btn");
      btn.disabled = false;

      setStatus("מוכן");

      btn.onclick = function () {
        try {
          const item = Office.context.mailbox && Office.context.mailbox.item;

          if (!item) {
            setStatus("❌ לא נמצא מייל פתוח");
            return;
          }

          const rawItemId = item.itemId || "";
          const convId = item.conversationId || "";
          const subject = item.subject || "";

          let msgId = rawItemId;

          if (Office.context.mailbox.convertToRestId && rawItemId) {
            msgId = Office.context.mailbox.convertToRestId(
              rawItemId,
              Office.MailboxEnums.RestVersion.v2_0
            );
          }

          const separator = APP_URL.includes("?") ? "&" : "?";

          const url = APP_URL
            + separator + "msgId=" + encodeURIComponent(msgId)
            + "&convId=" + encodeURIComponent(convId)
            + "&subject=" + encodeURIComponent(subject);

          // 👇 DEBUG על המסך
          setDebug({
            rawItemId,
            msgId,
            convId,
            subject,
            finalUrl: url
          });

          setStatus("🚀 פותח...");

          window.open(url, "_blank");

        } catch (err) {
          setStatus("❌ שגיאה: " + (err?.message || err));
        }
      };
    });
  </script>
</body>
</html>
